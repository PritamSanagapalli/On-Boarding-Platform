# ==========================================
# Server Configuration
# ==========================================
server.port=8080

# ==========================================
# Database Configuration (MySQL via Docker)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3308/onboarding?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=onboarding_user
spring.datasource.password=onboarding_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Firebase Configuration
# ==========================================
# Path to your Firebase service account JSON file
firebase.config.path=firebase-service-account.json

# ==========================================
# CORS Configuration
# ==========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

# ==========================================
# File Upload Configuration
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ==========================================
# Logging
# ==========================================
logging.level.com.onboarding=DEBUG
logging.level.org.springframework.security=DEBUG
