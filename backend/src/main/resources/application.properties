# ==========================================
# Server Configuration
# ==========================================
server.port=${PORT:8080}

# ==========================================
# Database Configuration
# Priority: 1. DB_URL env var | 2. Railway native variables | 3. Local dev fallback
spring.datasource.url=${DB_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3308}/${MYSQLDATABASE:onboarding}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:${MYSQLUSER:onboarding_user}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD:onboarding_pass}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Firebase Configuration
# ==========================================
# Path to Firebase service account JSON (classpath resource)
firebase.config.path=${FIREBASE_CONFIG_PATH:firebase-service-account.json}

# ==========================================
# CORS Configuration
# ==========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}

# ==========================================
# File Upload Configuration
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads}

# ==========================================
# Logging
# ==========================================
logging.level.com.onboarding=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}
